<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heitor - 1 aninho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Sacramento&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue-deep: #4a90c9;
    --blue-mid: #6fb0dd;
    --blue-soft: #a8d2ea;
    --ink: #2c5d8a;
    --text: #3a6b94;
  }

  html, body {
    width: 100%;
    height: 100%;
    min-height: 100vh;
    font-family: 'Quicksand', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(255,255,255,0.6) 0%, transparent 40%),
      radial-gradient(ellipse at 80% 85%, rgba(184,216,194,0.4) 0%, transparent 50%),
      linear-gradient(180deg, #e3f0f6 0%, #d2e7f0 50%, #bcdae8 100%);
  }

  body {
    display: block;
    min-height: 100vh;
  }

  .card {
    position: relative;
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
  }

  .deco { position: absolute; pointer-events: none; }

  .dolphin-left   { top: 2%;   left: -2%;  width: 32%; transform: rotate(-12deg); }
  .whale-right    { top: 0%;   right: -2%; width: 30%; transform: rotate(10deg); }
  .octopus        { top: 27%;  left: 0%;   width: 16%; }
  .turtle         { top: 32%;  right: 1%;  width: 18%; }
  .jellyfish      { top: 58%;  left: 2%;   width: 13%; }
  .shark          { top: 56%;  right: -3%; width: 22%; transform: rotate(-8deg); }
  .whale-bottom   { top: 73%;  left: 32%;  width: 30%; }
  .seaweed-left   { bottom: 0; left: 0;    width: 22%; }
  .seaweed-right  { bottom: 0; right: 0;   width: 24%; }
  .fish-1         { bottom: 9%;  left: 18%;  width: 9%; }
  .fish-2         { bottom: 4%;  left: 30%;  width: 6%; }
  .fish-3         { bottom: 11%; right: 30%; width: 9%; }
  .fish-4         { bottom: 8%;  right: 18%; width: 8%; }
  .stingray       { bottom: 3%;  right: 8%;  width: 11%; }
  .green-blob     {
    position: absolute;
    bottom: 22%;
    left: -5%;
    width: 48%;
    height: 32%;
    background: radial-gradient(ellipse at center, rgba(184,216,194,0.7) 0%, rgba(184,216,194,0) 65%);
    pointer-events: none;
  }

  @keyframes float-y {
    0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
    50%      { transform: translateY(-10px) rotate(calc(var(--rot, 0deg) + 2deg)); }
  }
  @keyframes float-x {
    0%, 100% { transform: translateX(0) scaleX(var(--sx, 1)); }
    50%      { transform: translateX(8px) scaleX(var(--sx, 1)); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }
  @keyframes wiggle {
    0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
    50%      { transform: translateY(-6px) rotate(calc(var(--rot, 0deg) - 3deg)); }
  }
  @keyframes bubble-rise {
    0%   { transform: translateY(0) scale(0.8); opacity: 0; }
    20%  { opacity: 0.9; }
    100% { transform: translateY(-200px) scale(1.2); opacity: 0; }
  }

  .dolphin-left   { --rot: -12deg; animation: float-y 5s ease-in-out infinite; }
  .whale-right    { --rot: 10deg;  animation: float-y 6s ease-in-out infinite 0.5s; }
  .whale-bottom   { animation: float-x 7s ease-in-out infinite; }
  .turtle         { animation: float-y 4.5s ease-in-out infinite 1s; }
  .jellyfish      { animation: wiggle 4s ease-in-out infinite; }
  .shark          { --rot: -8deg; animation: float-y 5.5s ease-in-out infinite 0.3s; }
  .octopus        { animation: float-y 4s ease-in-out infinite 0.8s; }
  .stingray       { animation: float-y 5s ease-in-out infinite 0.4s; }
  .seaweed-left, .seaweed-right { transform-origin: bottom center; animation: sway 6s ease-in-out infinite; }
  .fish-1 { animation: float-x 3.5s ease-in-out infinite; --sx: 1; }
  .fish-2 { animation: float-x 4s ease-in-out infinite 0.5s; --sx: 1; }
  .fish-3 { animation: float-x 3.8s ease-in-out infinite 0.2s; --sx: -1; }
  .fish-4 { animation: float-x 4.2s ease-in-out infinite 0.7s; --sx: -1; }

  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.25));
    border: 1px solid rgba(255,255,255,0.6);
    animation: bubble-rise 6s ease-in infinite;
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 6vh 10% 6vh;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    max-width: 600px;
    margin: 0 auto;
  }

  .name {
    font-family: 'Pacifico', cursive;
    font-size: clamp(3.5rem, 13vw, 6rem);
    color: var(--blue-deep);
    letter-spacing: 2px;
    line-height: 1;
    margin-top: 2vh;
    text-shadow: 2px 2px 0 #fff, -1px -1px 0 rgba(255,255,255,0.8), 0 4px 8px rgba(74,144,201,0.15);
    -webkit-text-stroke: 1px rgba(74,144,201,0.3);
  }

  .age {
    font-family: 'Sacramento', cursive;
    font-size: clamp(1.8rem, 5.5vw, 2.6rem);
    color: var(--blue-deep);
    margin-top: -0.5vh;
    margin-bottom: 5vh;
  }

  .section-title {
    font-family: 'Sacramento', cursive;
    font-size: clamp(1.6rem, 5vw, 2.3rem);
    color: var(--ink);
    margin-bottom: 4vh;
    position: relative;
    display: inline-block;
    align-self: center;
  }

  .section-title::before, .section-title::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 22px; height: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 14'><path d='M2 7 Q 6 2, 10 7 T 18 7' stroke='%234a90c9' stroke-width='1.5' fill='none' stroke-linecap='round'/><circle cx='20' cy='7' r='1.5' fill='%234a90c9'/></svg>");
    background-repeat: no-repeat;
    background-size: contain;
  }
  .section-title::before { right: 100%; margin-right: 14px; transform: translateY(-50%) scaleX(-1); }
  .section-title::after  { left: 100%;  margin-left: 14px;  transform: translateY(-50%); }

  .items { display: flex; flex-direction: column; gap: 0; }

  .item {
    display: grid;
    grid-template-columns: 80px 1fr;
    align-items: center;
    gap: 16px;
    padding: 2.5vh 0;
    text-align: left;
    position: relative;
  }

  .item + .item::before {
    content: '';
    position: absolute;
    top: 0; left: 18%; right: 18%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(74,144,201,0.4) 20%, rgba(74,144,201,0.4) 80%, transparent);
  }
  .item + .item::after {
    content: '';
    position: absolute;
    top: -3.5px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    background: var(--blue-soft);
    border-radius: 50%;
    border: 1px solid var(--blue-mid);
  }

  .item .icon { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
  .item .icon svg { width: 100%; height: 100%; }

  .item h3 {
    font-family: 'Sacramento', cursive;
    font-weight: 400;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    color: var(--ink);
    line-height: 1;
    margin-bottom: 4px;
  }
  .item p {
    font-family: 'Quicksand', sans-serif;
    font-size: clamp(0.95rem, 3vw, 1.1rem);
    color: var(--text);
    font-weight: 500;
  }

  @media (max-width: 480px) {
    .content { padding: 4vh 6% 4vh; }
    .item { grid-template-columns: 60px 1fr; gap: 12px; }
    .item .icon { width: 60px; height: 60px; }
  }
</style>
</head>
